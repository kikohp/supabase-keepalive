name: Supabase Keepalive Debug

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: Debug and Ping Supabase
        env:
          SUPABASE_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          echo "=== Starting Supabase Keepalive ==="
          
          # Check if secret exists
          if [ -z "$SUPABASE_KEY" ]; then
            echo "❌ ERROR: SUPABASE_ANON_KEY secret is not set!"
            exit 1
          fi
          
          echo "✅ Secret is set (length: ${#SUPABASE_KEY} characters)"
          
          # First, check if Supabase is responding at all
          echo ""
          echo "Testing Supabase connection..."
          
          RESPONSE=$(curl -s -w "\nHTTP_CODE:%{http_code}" \
            "https://yuzyplmvvbkugdnrrbof.supabase.co/rest/v1/config?select=id&limit=1" \
            -H "apikey: ${SUPABASE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_KEY}")
          
          HTTP_CODE=$(echo "$RESPONSE" | grep "HTTP_CODE:" | cut -d':' -f2)
          BODY=$(echo "$RESPONSE" | grep -v "HTTP_CODE:")
          
          echo "HTTP Status: $HTTP_CODE"
          echo "Response Body: $BODY"
          
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ SUCCESS! Database query worked!"
            exit 0
          else
            echo "❌ FAILED with status $HTTP_CODE"
            exit 1
          fi
